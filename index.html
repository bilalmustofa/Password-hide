<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
    <title>Password Hide & Show Toggle</title>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100 flex-column">
        <h1 class="mb-5">Password Hide & Show Toggle</h1>
        <div class="password-wrapper">
            <label for="password" class="form-label">Password</label>
            <div class="password-box d-flex justify-content-center align-items-center">
                <input type="password" class="password-input form-control" id="passwordInput" placeholder="Enter the password">
                <span class="eye-icon"><i class="fa-solid fa-eye-slash" id="eyeIcon"></i></span>
            </div>
            <div class="password-strength mt-3">
                <div class="strength-bar" id="strengthBar"></div>
                <p id="message"></p>
                <div class="strength-parameter" id="strengthParameter">
                    <div class="parameter-item" id="lengthParameter">
                        <i class="fa-solid fa-xmark" id="lengthIcon"></i>
                        <span>At least 8 characters</span>
                    </div>
                    <div class="parameter-item" id="uppercaseParameter">
                        <i class="fa-solid fa-xmark" id="uppercaseIcon"></i>
                        <span>At least 1 uppercase letter</span>
                    </div>
                    <div class="parameter-item" id="lowercaseParameter">
                        <i class="fa-solid fa-xmark" id="lowercaseIcon"></i>
                        <span>At least 1 lowercase letter</span>
                    </div>
                    <div class="parameter-item" id="numberParameter">
                        <i class="fa-solid fa-xmark" id="numberIcon"></i>
                        <span>At least 1 number</span>
                    </div>
                    <div class="parameter-item" id="specialParameter">
                        <i class="fa-solid fa-xmark" id="specialIcon"></i>
                        <span>At least 1 special character</span>
                    </div>
                </div>
            </div> 
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
